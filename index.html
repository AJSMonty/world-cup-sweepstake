        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #080808;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 1;
        }

        /* HEADER (Top Left) */
        .header {
            position: absolute;
            top: 4%;
            left: 3%;
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #d4af37;
            text-shadow: 2px 4px 6px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }
        .header h2 {
            margin: 4px 0 0 0;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 8px;
            color: #aaa;
            text-transform: uppercase;
        }

        /* LEGEND (Bottom Left) */
        .legend {
            position: absolute;
            bottom: 5%;
            left: 3%;
            text-align: left;
            z-index: 10;
        }
        .legend-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-top: 10px;
            font-size: 16px;
            color: #bbb;
            letter-spacing: 1px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 12px;
            border: 2px solid transparent;
        }
        .dot.active {
            background-color: #1a1a1a;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }
        .dot.inactive {
            background-color: #050505;
            border-color: #444;
        }

        /* SWEEPSTAKE LEDGER (Top Right Panel) */
        .ledger-container {
            position: absolute;
            top: 4%;
            right: 3%;
            width: 600px;
            height: 53%;
            background: rgba(12, 12, 12, 0.9);
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* PRIZE PREDICTOR (Bottom Right Panel) */
        .prizes-container {
            position: absolute;
            bottom: 4%;
            right: 3%;
            width: 600px;
            height: 36%;
            background: rgba(12, 12, 12, 0.9);
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: linear-gradient(180deg, #2a2211, #100e08);
            border-bottom: 2px solid #d4af37;
            padding: 12px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }
        .panel-header h3 {
            margin: 0;
            color: #d4af37;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .panel-header p {
            margin: 4px 0 0 0;
            color: #aaa;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .panel-body {
            padding: 15px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-body::-webkit-scrollbar { width: 8px; }
        .panel-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .panel-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-title.eliminated {
            color: #F44336;
            margin-top: 15px;
        }

        .grid-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            align-content: start;
        }

        .team-row {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 14px;
        }
        .team-flag {
            font-size: 16px;
            margin-right: 10px;
            width: 24px;
            text-align: center;
        }
        .team-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-name { font-weight: 600; color: #eee; }
        .team-owner { color: #d4af37; font-style: italic; font-size: 13px; padding-left: 5px; }

        .eliminated-row {
            background: rgba(255, 255, 255, 0.02);
            opacity: 0.45;
            filter: grayscale(100%);
        }
        .eliminated-row .team-name { text-decoration: line-through; color: #888; }
        .eliminated-row .team-owner { color: #666; }

        /* PRIZE ROWS */
        .prize-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 3px solid #444;
        }
        .prize-row.gold { border-left-color: #d4af37; background: rgba(212, 175, 55, 0.05); }
        .prize-row.silver { border-left-color: #C0C0C0; }
        .prize-row.bronze { border-left-color: #cd7f32; }
        
        .prize-details { display: flex; flex-direction: column; }
        .prize-title { font-weight: bold; color: #eee; font-size: 14px; }
        .prize-amount { color: #4CAF50; font-size: 13px; margin-top: 2px; }
        
        .prize-winner { text-align: right; display: flex; flex-direction: column; }
        .prize-team { color: #fff; font-weight: 600; font-size: 14px; }
        .prize-owner { color: #d4af37; font-style: italic; font-size: 13px; }

        /* ------------------------------------------------------------------
           MOBILE RESPONSIVENESS
        ------------------------------------------------------------------ */
        * { box-sizing: border-box; }

        @media (max-width: 1100px) {
            html { height: auto; overflow-y: visible; }
            body, html { overflow-x: hidden; }
            body { overflow-y: visible; display: flex; flex-direction: column; height: auto; min-height: 100%; }

            /* Float the bracket graphic to the top, panels below */
            .header           { order: 1; }
            canvas            { order: 2; }
            .legend           { order: 3; }
            .ledger-container { order: 4; }
            .prizes-container { order: 5; }

            .header { position: static; text-align: center; padding: 20px 10px 5px; }
            .header h1 { font-size: 28px; letter-spacing: 2px; }
            .header h2 { font-size: 14px; letter-spacing: 4px; }
            /* The circular tree only fills the middle ~45% of the 1920-wide
               canvas. Overscale it and pull it left so the empty side bands
               are cropped (by body's overflow-x:hidden) and the bracket
               fills the screen width. Vertically it stays fully visible. */
            canvas { position: relative; width: 178%; max-width: none; height: auto; margin: 0 0 0 -39%; aspect-ratio: 1920 / 1080; display: block; object-fit: contain; }
            .legend { position: static; display: flex; justify-content: center; gap: 20px; padding: 15px 10px; flex-wrap: wrap; }
            .legend-item { margin-top: 0; font-size: 14px; }
            .ledger-container { position: static; width: 92%; max-width: 600px; margin: 10px auto; height: auto; max-height: 420px; }
            .prizes-container { position: static; width: 92%; max-width: 600px; margin: 15px auto 40px auto; height: auto; }
            .grid-list { grid-template-columns: 1fr 1fr; }
        }

        /* Phones */
        @media (max-width: 600px) {
            .header { padding: 16px 8px 4px; }
            .header h1 { font-size: 22px; letter-spacing: 1px; }
            .header h2 { font-size: 12px; letter-spacing: 3px; }
            .legend { gap: 12px; padding: 12px 8px; }
            .legend-item { font-size: 12px; }
            .ledger-container, .prizes-container { width: 94%; }
            .panel-header h3 { font-size: 16px; letter-spacing: 1px; }
            .panel-header p { font-size: 11px; }
            .panel-body { padding: 12px 12px; }
            .section-title { font-size: 14px; }
            .grid-list { grid-template-columns: 1fr; }
            .team-row { font-size: 13px; padding: 6px 8px; }
            .team-flag { font-size: 15px; margin-right: 8px; width: 20px; }
            .team-owner { font-size: 12px; }
            /* Stack each prize so long status text never overflows */
            .prize-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .prize-winner { text-align: left; align-items: flex-start; }
            .prize-title { font-size: 13px; }
            .prize-team, .prize-owner { font-size: 12px; }
        }
    </style>
</head>

        // ENGINE LOGIC IMPLEMENTATION

        var canvas = document.getElementById('bracket');
        var ctx = canvas.getContext('2d');
        var cx = 580; var cy = 560;
        var R = [380, 310, 240, 170, 100, 45];

        // Bracket sits left on desktop (panels are to its right) but is
        // centered on mobile, where the panels stack underneath instead.
        function setCenter() {
            cx = (window.innerWidth <= 1100) ? 960 : 580;
        }
        setCenter();
        window.addEventListener('resize', function() {
            setCenter();
            buildTree();
        });
        
        var activeTeams = [];
        var eliminatedTeams = [];

        function processStandings() {
            activeTeams = [];
            eliminatedTeams = [];

            var knockoutSet = new Set(qualifiedTeamCodes);
            var matchLosers = new Set();
            
            knockoutMatches.forEach(function(m) {
                if (m.winner) {
                    if (m.winner === m.a) matchLosers.add(m.b);
                    if (m.winner === m.b) matchLosers.add(m.a);
                }
            });

            masterTeams.forEach(function(team) {
                if (!knockoutSet.has(team.code) || matchLosers.has(team.code)) {
                    eliminatedTeams.push(team);
                } else {
                    activeTeams.push(team);
                }
            });

            document.getElementById('active-count').innerText = activeTeams.length;
            document.getElementById('elim-count').innerText = eliminatedTeams.length;

            renderList('active-list', activeTeams, false);
            renderList('eliminated-list', eliminatedTeams, true);
            renderPrizes();
        }

        function renderList(elementId, list, isElim) {
            var html = '';
            list.forEach(function(team) {
                html += '<div class="team-row' + (isElim ? ' eliminated-row' : '') + '">' +

                            '<div class="team-info">' +
                                '<span class="team-name">' + team.name + '</span>' +
                                '<span class="team-owner">' + team.owner + '</span>' +
                            '</div>' +
                        '</div>';
            });
            document.getElementById(elementId).innerHTML = html;
        }

                { key: 'dirtiestTeam', title: 'Dirtiest Team', amt: '£40', class: '' }
            ];

            var container = document.getElementById('prizes-list');
            var html = '';

            prizeDefinitions.forEach(function(p) {
                var config = dynamicPrizes[p.key];
                var displayTeam = "TBD";
                var displayOwner = config.status;

                if (config.code) {
                    var t = masterTeams.find(function(item) { return item.code === config.code; });

                    }
                }

                html += '<div class="prize-row ' + p.class + '">' +
                            '<div class="prize-details">' +
                                '<span class="prize-title">' + p.title + '</span>' +
                                '<span class="prize-amount">' + p.amt + '</span>' +
                            '</div>' +
                            '<div class="prize-winner">' +
                                '<span class="prize-team">' + displayTeam + '</span>' +
                                '<span class="prize-owner">' + displayOwner + '</span>' +
                            '</div>' +
                        '</div>';
            });
            container.innerHTML = html;
        }

        var tree = [];
        var segments = [];
        var step = (Math.PI * 2) / 32;
        var angleOffset = Math.PI - 7.5 * step;

        function buildTree() {
            segments = [];
            
            var initialNodes = qualifiedTeamCodes.map(function(code, i) {
                var teamObj = masterTeams.find(function(t) { return t.code === code; }) || { name: code, flag: '🏳️' };
                var angle = angleOffset + i * step;
                return { team: teamObj, angle: angle, x: cx + Math.cos(angle) * R[0], y: cy + Math.sin(angle) * R[0] };
            });

            tree[0] = initialNodes;

            for (var r = 1; r <= 5; r++) {
                tree[r] = [];
                for (var i = 0; i < tree[r-1].length; i += 2) {
                    var n1 = tree[r-1][i];
                    var n2 = tree[r-1][i+1];
                    var midAngle = (n1.angle + n2.angle) / 2;
                    
                    var winnerTeam = null;
                    if (n1.team && n2.team) {
                        var match = knockoutMatches.find(function(m) {
                            return (m.a === n1.team.code && m.b === n2.team.code) || (m.b === n1.team.code && m.a === n2.team.code);
                        });
                        if (match && match.winner) {
                            winnerTeam = masterTeams.find(function(t) { return t.code === match.winner; });
                        }
                    }

                    var node = { team: winnerTeam, angle: midAngle, x: cx + Math.cos(midAngle) * R[r], y: cy + Math.sin(midAngle) * R[r] };
                    tree[r].push(node);

                    var r_mid = (R[r-1] + R[r]) / 2;
                    var active1 = !!(n1.team && winnerTeam && n1.team.code === winnerTeam.code);
                    var active2 = !!(n2.team && winnerTeam && n2.team.code === winnerTeam.code);
                    var activeOut = !!(winnerTeam !== null);

                    if (r === 5) {
                        segments.push({ type: 'line', x1: n1.x, y1: n1.y, x2: node.x, y2: node.y, active: active1 });
                        segments.push({ type: 'line', x1: n2.x, y1: n2.y, x2: node.x, y2: node.y, active: active2 });
                        continue; 
                    }

                    segments.push({ type: 'line', x1: n1.x, y1: n1.y, x2: cx + Math.cos(n1.angle) * r_mid, y2: cy + Math.sin(n1.angle) * r_mid, active: active1 });
                    segments.push({ type: 'arc', r: r_mid, start: n1.angle, end: midAngle, ccw: false, active: active1 });
                    segments.push({ type: 'line', x1: n2.x, y1: n2.y, x2: cx + Math.cos(n2.angle) * r_mid, y2: cy + Math.sin(n2.angle) * r_mid, active: active2 });
                    segments.push({ type: 'arc', r: r_mid, start: n2.angle, end: midAngle, ccw: true, active: active2 });
                    segments.push({ type: 'line', x1: cx + Math.cos(midAngle) * r_mid, y1: cy + Math.sin(midAngle) * r_mid, x2: node.x, y2: node.y, active: activeOut });
                }
            }
        }

        var trophyLoaded = false;
        var trophyImg = new Image();
        trophyImg.onload = function() { trophyLoaded = true; };
        trophyImg.src = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTUwIj48cGF0aCBkPSJNMjAgMjBDMjAgODAgNDAgMTAwIDUwIDEwMEM2MCAxMDAgODAgODAgODAgMjBaIiBmaWxsPSIjZDRhZjM3IiBzdHJva2U9IiNhYTgwMDAiIHN0cm9rZS13aWR0aD0iMiIvPjxwYXRoIGQ9Ik0yMCAzMEMwIDMwIDAgNjAgMjAgNzBNODAgMzBDMTAwIDMwIDEwMCA2MCA4MCA3MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZDRhZjM3IiBzdHJva2Utd2lkdGg9IjYiLz48cmVjdCB4PSI0MCIgeT0iMTAwIiB3aWR0aD0iMjAiIGhlaWdodD0iMTAiIGZpbGw9IiNkNGFmMzciLz48cmVjdCB4PSIzMCIgeT0iMTMwIiB3aWR0aD0iNDAiIGhlaWdodD0iMTAiIGZpbGw9IiNkNGFmMzciLz48cmVjdCB4PSIyMCIgeT0iMTQwIiB3aWR0aD0iNjAiIGhlaWdodD0iMTAiIGZpbGw9IiNhYTgwMDAiLz48ZWxsaXBzZSBjeD0iNTAiIGN5PSIyMCIgcng9IjMwIiByeT0iMTAiIGZpbGw9IiNmZmQ3MDAiIHN0cm9rZT0iI2FhODAwMCIgc3Ryb2tlLXdpZHRoPSIyIi8+PC9zdmc+";

        function drawSegment(s) {
            ctx.beginPath();
            if (s.type === 'line') { ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); }
            else if (s.type === 'arc') { ctx.arc(cx, cy, s.r, s.start, s.end, s.ccw); }
            ctx.stroke();
        }

        function drawNodesAndText() {
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 13px sans-serif';
            
            tree[0].forEach(function(n) {
                var x = cx + Math.cos(n.angle) * (R[0] + 25);
                var y = cy + Math.sin(n.angle) * (R[0] + 25);
                ctx.save();
                ctx.translate(x, y);
                var a = n.angle % (Math.PI * 2);
                if (a < 0) a += Math.PI * 2;
                ctx.fillStyle = '#ccc';
                if (a > Math.PI / 2 && a < 3 * Math.PI / 2) {
                    ctx.rotate(a + Math.PI); ctx.textAlign = 'right';
                    ctx.fillText(n.team.name, 0, 0);
                } else {
                    ctx.rotate(a); ctx.textAlign = 'left';
                    ctx.fillText(n.team.name, 0, 0);
                }
                ctx.restore();
            });

            for (var r = 0; r <= 4; r++) {
                tree[r].forEach(function(n) {
                    var isActive = (r === 0) ? true : !!n.team; 
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 14, 0, Math.PI * 2);
                    ctx.fillStyle = isActive ? '#14120e' : '#0a0a0a';
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = isActive ? '#d4af37' : '#444';
                    ctx.stroke();

                    if (n.team) {
                        ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
                        ctx.fillText(n.team.flag, n.x, n.y + 2); 
                    }
                });
            }
        }

        var startTime = Date.now();

        function render() {
            var elapsed = (Date.now() - startTime) / 1000;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            var grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 800);
            grad.addColorStop(0, 'rgba(40, 32, 10, 0.4)'); grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineCap = 'round';
            ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)'; ctx.setLineDash([]);
            segments.forEach(function(s) { if (!s.active) drawSegment(s); });

            ctx.lineWidth = 3.5; ctx.strokeStyle = '#9e781d'; 
            segments.forEach(function(s) { if (s.active) drawSegment(s); });

            var timeStep = Math.floor(elapsed * 50); 
            ctx.lineWidth = 3.5; ctx.strokeStyle = '#ffe891'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 10;
            ctx.setLineDash([15, 35]); ctx.lineDashOffset = -timeStep; 
            segments.forEach(function(s) { if (s.active) drawSegment(s); });
            
            ctx.setLineDash([]); ctx.shadowBlur = 0;
            drawNodesAndText();
            
            if (trophyLoaded) {
                ctx.shadowBlur = 25; ctx.shadowColor = '#d4af37';
                ctx.drawImage(trophyImg, cx - 30, cy - 45, 60, 90);
                ctx.shadowBlur = 0; 
            }
            requestAnimationFrame(render);
        }

        function init() {
            processStandings();
            buildTree();
            requestAnimationFrame(render);
        }

        // Load the live data file, then start. Cache-busted so a fresh
        // commit shows up without a hard refresh. Falls back silently to the
        // embedded defaults above if data.json isn't reachable.
        fetch('data.json?t=' + Date.now())
            .then(function(res) { return res.ok ? res.json() : Promise.reject(new Error('no data.json')); })
            .then(function(data) {
                if (data && Array.isArray(data.knockoutMatches)) knockoutMatches = data.knockoutMatches;
                if (data && data.dynamicPrizes) dynamicPrizes = data.dynamicPrizes;
            })
            .catch(function() { /* use embedded fallback defaults */ })
            .then(init);
    </script>
