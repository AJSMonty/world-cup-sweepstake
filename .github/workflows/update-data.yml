name: Update results

# Pulls the latest knockout results from API-Football and commits data.json.
# The live GitHub Pages site picks up the new data automatically within ~30s.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 min (~48 API calls/day — under the free tier)
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

permissions:
  contents: write

# Don't let overlapping scheduled runs race on a push.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results and rewrite data.json
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # Optional overrides (defaults: league 1 = World Cup, season 2026):
          # API_FOOTBALL_LEAGUE: "1"
          # API_FOOTBALL_SEASON: "2026"
        run: node scripts/update-data.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data.json; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: auto-update results from API-Football"
            git push
          fi
